apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-system 
  labels:
    app: java-test-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-test-app
  template:
    metadata:
      labels:
        app: java-test-app
    spec:
      containers:
      - name: java-test-app
        image: vikhyathveluri/payment-system:latest  
        imagePullPolicy: Always
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
spec:
  type: NodePort
  selector:
    app: java-test-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080